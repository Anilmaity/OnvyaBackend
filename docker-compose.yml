services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: onvya
      POSTGRES_USER: onvya
      POSTGRES_PASSWORD: onvya
    ports:
      - "5432:5432"
    volumes:
      - onvya_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onvya -d onvya"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  onvya_pg:
