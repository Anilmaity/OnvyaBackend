services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: onvya
      POSTGRES_USER: onvya
      POSTGRES_PASSWORD: onvya
    ports:
      - "5433:5432"
    volumes:
      - onvya_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onvya -d onvya"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: onvya-backend:latest
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  onvya_pg:
